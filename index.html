<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rutas Perfiles - Gestión Logística Avanzada</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Iconos Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- jsPDF para PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <!-- SheetJS para leer Excel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        #map { height: 500px; width: 100%; border-radius: 0 0 1.5rem 1.5rem; border: 1px solid #e2e8f0; }
        .tab-active { border-bottom: 4px solid #f59e0b; color: #f59e0b; font-weight: 800; }
        .tab-inactive { color: #94a3b8; font-weight: 600; border-bottom: 4px solid transparent; }
        .stat-card { transition: all 0.3s ease; }
        .stat-card:hover { transform: translateY(-2px); }
        .pac-container { border-radius: 1rem; border: 1px solid #e2e8f0; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); margin-top: 5px; font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">

    <div class="max-w-7xl mx-auto p-4 md:p-8">
        
        <!-- Header -->
        <header class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
            <div class="flex items-center gap-4">
                <div class="bg-indigo-600 p-3 rounded-2xl shadow-xl shadow-indigo-100">
                    <i data-lucide="truck" class="text-white w-7 h-7"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-black text-slate-900 leading-none tracking-tight">Rutas Perfiles</h1>
                    <div class="flex items-center gap-2 mt-2">
                        <div id="status-dot" class="w-2.5 h-2.5 rounded-full bg-slate-300"></div>
                        <p id="status-text" class="text-[10px] font-bold uppercase tracking-widest text-slate-400">Esperando API Key...</p>
                    </div>
                </div>
            </div>

            <div class="flex items-center gap-2 bg-white px-4 py-2.5 rounded-2xl border border-slate-200 shadow-sm focus-within:ring-2 focus-within:ring-orange-500/20 transition-all">
                <i data-lucide="key" class="w-3.5 h-3.5 text-slate-400"></i>
                <input 
                    type="password" 
                    id="api-key-input" 
                    placeholder="Ingrese su Google API Key..." 
                    class="text-xs outline-none w-48 md:w-64 bg-transparent font-mono"
                >
            </div>
        </header>

        <!-- PANELES DE RESUMEN VISUAL -->
        <div id="summary-panel" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="stat-card bg-white p-5 rounded-[1.5rem] border border-slate-200 shadow-sm">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Distancia Total</p>
                <h3 id="stat-distance" class="text-2xl font-black text-slate-900 leading-none">0.0 km</h3>
            </div>
            <div class="stat-card bg-white p-5 rounded-[1.5rem] border border-slate-200 shadow-sm">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Tiempo Estimado</p>
                <h3 id="stat-time" class="text-2xl font-black text-slate-900 leading-none">0 min</h3>
            </div>
            <div class="stat-card bg-white p-5 rounded-[1.5rem] border border-slate-200 shadow-sm">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Eficiencia (Ahorro)</p>
                <h3 id="stat-efficiency" class="text-2xl font-black text-emerald-500 leading-none">0%</h3>
            </div>
            <div class="stat-card bg-white p-5 rounded-[1.5rem] border border-slate-200 shadow-sm">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Riesgo Frontera</p>
                <h3 id="stat-risk" class="text-2xl font-black text-slate-300 leading-none">N/A</h3>
            </div>
        </div>

        <!-- Navegación -->
        <div class="flex gap-8 mb-6 bg-white px-6 rounded-2xl shadow-sm border border-slate-100 overflow-x-auto">
            <button id="tab-mx" onclick="switchTab('mx')" class="tab-active py-5 px-2 flex items-center gap-2 transition-all whitespace-nowrap">
                <i data-lucide="shield-check" class="w-4 h-4"></i>
                Solo México
            </button>
            <button id="tab-global" onclick="switchTab('global')" class="tab-inactive py-5 px-2 flex items-center gap-2 transition-all whitespace-nowrap">
                <i data-lucide="globe" class="w-4 h-4"></i>
                Internacional (EUA)
            </button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- Columna Izquierda: Entrada de Datos -->
            <div class="lg:col-span-4 space-y-4">
                <div class="bg-white rounded-[2rem] shadow-sm border border-slate-200 p-6 md:p-8">
                    <div class="mb-4">
                        <h2 class="font-bold text-slate-800 flex items-center gap-3">
                            <i data-lucide="list" class="text-orange-500 w-5 h-5"></i>
                            Puntos de Trayecto
                        </h2>
                    </div>

                    <!-- Autocompletado / Asistente -->
                    <div class="relative mb-4">
                        <div class="flex items-center gap-2 mb-2">
                             <input 
                                type="text" 
                                id="autocomplete-input" 
                                placeholder="Busca una dirección exacta..." 
                                class="flex-1 text-xs p-3 bg-indigo-50/50 border border-indigo-100 rounded-xl outline-none focus:border-indigo-400"
                            >
                            <button onclick="addFromAutocomplete()" class="p-3 bg-indigo-600 text-white rounded-xl hover:bg-indigo-700 transition-all">
                                <i data-lucide="plus" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>

                    <textarea 
                        id="locations-input"
                        placeholder="Punto 1 (Origen)&#10;Punto 2..."
                        class="w-full h-48 p-5 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-orange-500/10 focus:border-orange-400 outline-none text-sm resize-none font-mono transition-all custom-scrollbar mb-4"
                    ></textarea>

                    <!-- Botones de Acción Secundaria -->
                    <div class="grid grid-cols-2 gap-3 mb-6">
                        <button onclick="document.getElementById('file-upload').click()" class="flex items-center justify-center gap-2 p-3 bg-slate-100 text-slate-600 rounded-xl text-[10px] font-bold hover:bg-slate-200 transition-all uppercase">
                            <i data-lucide="upload-cloud" class="w-3.5 h-3.5 text-blue-500"></i> Carga Excel
                        </button>
                        <input type="file" id="file-upload" class="hidden" accept=".xlsx, .csv">
                        <button onclick="clearAll()" class="flex items-center justify-center gap-2 p-3 bg-slate-100 text-slate-600 rounded-xl text-[10px] font-bold hover:bg-red-50 hover:text-red-600 transition-all uppercase">
                            <i data-lucide="trash-2" class="w-3.5 h-3.5"></i> Limpiar
                        </button>
                    </div>

                    <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100 space-y-4 shadow-inner mb-6">
                        <label class="flex items-center gap-3 cursor-pointer group">
                            <input type="checkbox" id="heavy-toggle" class="w-5 h-5 rounded border-slate-300 text-orange-600 cursor-pointer">
                            <span class="text-[11px] font-bold text-slate-700">Perfil Vehículo Pesado (Trailer)</span>
                        </label>
                        <label class="flex items-center gap-3 cursor-pointer group">
                            <input type="checkbox" id="optimize-toggle" class="w-5 h-5 rounded border-slate-300 text-orange-600 cursor-pointer" checked>
                            <span class="text-[11px] font-bold text-slate-700">Optimizar paradas intermedias</span>
                        </label>
                        <label class="flex items-center gap-3 cursor-pointer group">
                            <input type="checkbox" id="return-toggle" class="w-5 h-5 rounded border-slate-300 text-orange-600 cursor-pointer">
                            <span class="text-[11px] font-bold text-slate-700">Incluir retorno al Origen</span>
                        </label>
                    </div>

                    <button 
                        id="btn-calculate"
                        onclick="startProcess()"
                        class="w-full py-4 rounded-2xl font-black text-sm flex items-center justify-center gap-3 transition-all bg-indigo-600 text-white hover:bg-indigo-700 shadow-xl shadow-indigo-200 active:scale-95"
                    >
                        <i data-lucide="play" class="w-5 h-5 fill-current"></i>
                        CALCULAR LOGÍSTICA
                    </button>
                </div>
            </div>

            <!-- Columna Derecha -->
            <div class="lg:col-span-8 space-y-6">
                <!-- Mapa -->
                <div id="map-container" class="hidden">
                    <div class="bg-slate-900 text-white p-4 rounded-t-[1.5rem] flex flex-col md:flex-row justify-between items-center gap-4">
                        <div class="flex items-center gap-3">
                            <i data-lucide="navigation" class="w-4 h-4 text-orange-400"></i>
                            <span id="map-header-text" class="text-[10px] font-black uppercase tracking-widest">Mapa de Trayectorias</span>
                        </div>
                        <div class="flex gap-3">
                            <button onclick="exportInstructionsPDF()" class="text-[10px] bg-red-600 px-4 py-2 rounded-xl font-bold hover:bg-red-700 transition-all flex items-center gap-2">
                                <i data-lucide="file-down" class="w-3.5 h-3.5 text-white"></i> Descargar PDF
                            </button>
                            <button onclick="exportToCSV()" class="text-[10px] bg-emerald-600 px-4 py-2 rounded-xl font-bold hover:bg-emerald-700 transition-all flex items-center gap-2">
                                <i data-lucide="file-spreadsheet" class="w-3.5 h-3.5 text-white"></i> Excel
                            </button>
                        </div>
                    </div>
                    <div id="map"></div>
                </div>

                <!-- Tabla de Resultados -->
                <div id="results-container" class="hidden bg-white rounded-[2rem] shadow-sm border border-slate-200 overflow-hidden">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="bg-slate-50 text-slate-400 text-[9px] uppercase tracking-widest font-black border-b border-slate-100">
                                <th class="px-8 py-5 text-center">Tramo</th>
                                <th class="px-8 py-5">Ubicaciones</th>
                                <th class="px-8 py-5 text-center">Distancia</th>
                                <th class="px-8 py-5 text-center">Duración</th>
                            </tr>
                        </thead>
                        <tbody id="results-body" class="divide-y divide-slate-100 text-sm font-medium"></tbody>
                    </table>
                </div>

                <div id="empty-state" class="flex flex-col items-center justify-center h-full text-slate-300 py-32 bg-white rounded-[2rem] border border-dashed border-slate-200">
                    <i data-lucide="route" class="w-20 h-20 opacity-10 mb-4"></i>
                    <p class="text-sm font-bold uppercase tracking-widest text-center">Inicie la operación ingresando los destinos</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        let currentMode = 'mx'; 
        let mapsLoaded = false;
        let resultsData = [];
        let map, directionsService, geocoder, distanceMatrixService, autocomplete;
        let polylines = [];
        let markers = [];

        function switchTab(mode) {
            currentMode = mode;
            document.getElementById('tab-mx').className = mode === 'mx' ? 'tab-active py-5 px-2 flex items-center gap-2 transition-all' : 'tab-inactive py-5 px-2 flex items-center gap-2 transition-all';
            document.getElementById('tab-global').className = mode === 'global' ? 'tab-active py-5 px-2 flex items-center gap-2 transition-all' : 'tab-inactive py-5 px-2 flex items-center gap-2 transition-all';
            lucide.createIcons();
        }

        document.getElementById('api-key-input').addEventListener('input', function(e) {
            const key = e.target.value.trim();
            if (key.length > 20) loadGoogleMaps(key);
        });

        // CARGA MASIVA DE EXCEL
        document.getElementById('file-upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(evt) {
                const bstr = evt.target.result;
                const wb = XLSX.read(bstr, {type:'binary'});
                const wsname = wb.SheetNames[0];
                const ws = wb.Sheets[wsname];
                const data = XLSX.utils.sheet_to_json(ws, {header:1});
                
                const addresses = data.map(row => row[0]).filter(a => a && String(a).trim().length > 0);
                document.getElementById('locations-input').value = addresses.join('\n');
                alert(`¡Se cargaron ${addresses.length} direcciones!`);
            };
            reader.readAsBinaryString(file);
        });

        function loadGoogleMaps(key) {
            const oldScript = document.getElementById('google-maps-js');
            if (oldScript) oldScript.remove();
            const script = document.createElement('script');
            script.id = 'google-maps-js';
            script.src = `https://maps.googleapis.com/maps/api/js?key=${key}&libraries=geometry,places&language=es-mx&region=MX`;
            script.async = true;
            script.onload = () => {
                mapsLoaded = true;
                document.getElementById('status-dot').className = "w-2.5 h-2.5 rounded-full bg-emerald-500 shadow-md";
                document.getElementById('status-text').innerText = "Sistema Listo";
                initMap();
                initAutocomplete();
            };
            document.head.appendChild(script);
        }

        function initMap() {
            map = new google.maps.Map(document.getElementById("map"), {
                zoom: 5,
                center: { lat: 23.6345, lng: -102.5528 },
                styles: [{ featureType: "poi", elementType: "labels", stylers: [{ visibility: "off" }] }]
            });
            directionsService = new google.maps.DirectionsService();
            geocoder = new google.maps.Geocoder();
            distanceMatrixService = new google.maps.DistanceMatrixService();
        }

        function initAutocomplete() {
            autocomplete = new google.maps.places.Autocomplete(document.getElementById('autocomplete-input'), {
                componentRestrictions: currentMode === 'mx' ? { country: "mx" } : {},
                fields: ["address_components", "geometry", "name", "formatted_address"]
            });
        }

        function addFromAutocomplete() {
            const place = autocomplete.getPlace();
            if (!place || !place.formatted_address) {
                const val = document.getElementById('autocomplete-input').value;
                if (val) document.getElementById('locations-input').value += val + '\n';
            } else {
                document.getElementById('locations-input').value += place.formatted_address + '\n';
            }
            document.getElementById('autocomplete-input').value = "";
        }

        function clearAll() {
            document.getElementById('locations-input').value = "";
            document.getElementById('empty-state').classList.remove('hidden');
            document.getElementById('map-container').classList.add('hidden');
            document.getElementById('results-container').classList.add('hidden');
            updateSummary(0, 0, 0, 'N/A');
        }

        async function startProcess() {
            if (!mapsLoaded) return alert("API Key no detectada.");
            const input = document.getElementById('locations-input').value.trim();
            let rawPoints = input.split('\n').map(p => p.trim()).filter(p => p.length > 0);
            if (rawPoints.length < 2) return alert("Escriba al menos 2 puntos.");

            const btn = document.getElementById('btn-calculate');
            const optimize = document.getElementById('optimize-toggle').checked;
            const includeReturn = document.getElementById('return-toggle').checked;
            const heavyVehicle = document.getElementById('heavy-toggle').checked;
            
            btn.disabled = true;
            btn.innerHTML = `<i data-lucide="refresh-cw" class="w-4 h-4 animate-spin"></i> Procesando...`;
            lucide.createIcons();

            polylines.forEach(p => p.setMap(null));
            markers.forEach(m => m.setMap(null));
            polylines = []; markers = [];
            document.getElementById('results-body').innerHTML = "";

            try {
                let geoPoints = [];
                for(let p of rawPoints) {
                    const res = await new Promise((resolve) => {
                        geocoder.geocode({ address: currentMode === 'mx' ? p + ", México" : p, componentRestrictions: currentMode === 'mx' ? {country: 'MX'} : {} }, (r) => resolve(r));
                    });
                    if (res) geoPoints.push({ name: p, location: res[0].geometry.location });
                }

                // Cálculo Distancia Original para Estadísticas de Eficiencia
                const originalDist = await calculateTotalDistance(geoPoints, currentMode === 'mx', heavyVehicle);

                if (optimize && geoPoints.length > 2) {
                    geoPoints = await optimizeRoute(geoPoints, currentMode === 'mx', heavyVehicle);
                }

                if (includeReturn) {
                    geoPoints.push({ ...geoPoints[0], name: geoPoints[0].name + " (Retorno)" });
                }

                document.getElementById('empty-state').classList.add('hidden');
                document.getElementById('results-container').classList.remove('hidden');
                document.getElementById('map-container').classList.remove('hidden');

                resultsData = [];
                let totalMeters = 0, totalSeconds = 0, hasViolation = false;
                const bounds = new google.maps.LatLngBounds();

                for (let i = 0; i < geoPoints.length - 1; i++) {
                    const response = await new Promise((resolve) => {
                        directionsService.route({
                            origin: geoPoints[i].location,
                            destination: geoPoints[i+1].location,
                            travelMode: 'DRIVING',
                            avoidHighways: currentMode === 'mx' || heavyVehicle,
                            avoidTolls: currentMode === 'mx' || heavyVehicle,
                            region: 'MX'
                        }, (res) => resolve(res));
                    });

                    const leg = response.routes[0].legs[0];
                    const path = response.routes[0].overview_path;
                    const isUsRoute = path.some(c => c.lat() > 32.72 || (c.lng() > -106.5 && c.lat() > 31.8));
                    if (isUsRoute && currentMode === 'mx') hasViolation = true;

                    const rowData = { 
                        desde: geoPoints[i].name, hasta: geoPoints[i+1].name,
                        distancia: (isUsRoute && currentMode === 'mx') ? "BLOQUEADO" : leg.distance.text,
                        duracion: (isUsRoute && currentMode === 'mx') ? "ENTRÓ A EUA" : leg.duration.text,
                        meters: (isUsRoute && currentMode === 'mx') ? 0 : leg.distance.value,
                        seconds: (isUsRoute && currentMode === 'mx') ? 0 : leg.duration.value,
                        violation: isUsRoute && currentMode === 'mx',
                        isReturn: includeReturn && i === geoPoints.length - 2,
                        steps: leg.steps
                    };

                    resultsData.push(rowData);
                    totalMeters += rowData.meters;
                    totalSeconds += rowData.seconds;

                    const poly = new google.maps.Polyline({
                        path: path,
                        strokeColor: rowData.violation ? "#ef4444" : (rowData.isReturn ? "#3b82f6" : (currentMode === 'mx' ? "#f59e0b" : "#10b981")),
                        strokeWeight: 6, map: map
                    });
                    polylines.push(poly);
                    path.forEach(p => bounds.extend(p));
                    addTableRow(rowData, i + 1);
                }

                // Actualizar Panel de Resumen
                const eff = originalDist > 0 ? Math.round(((originalDist - totalMeters) / originalDist) * 100) : 0;
                updateSummary(totalMeters, totalSeconds, eff, hasViolation ? 'ALTO' : 'SEGURO');

                geoPoints.forEach((p, idx) => {
                    if (!(includeReturn && idx === geoPoints.length - 1)) {
                        markers.push(new google.maps.Marker({ position: p.location, map: map, label: { text: (idx + 1).toString(), color: 'white' } }));
                    }
                });

                map.fitBounds(bounds);
            } catch (err) { alert("Error de cálculo logístico."); }
            btn.disabled = false; btn.innerHTML = `<i data-lucide="play" class="w-5 h-5 fill-current"></i> CALCULAR LOGÍSTICA`;
            lucide.createIcons();
        }

        async function calculateTotalDistance(points, isMx, heavy) {
            let d = 0;
            for(let i=0; i<points.length-1; i++) {
                const r = await new Promise(res => {
                    distanceMatrixService.getDistanceMatrix({ origins:[points[i].location], destinations:[points[i+1].location], travelMode:'DRIVING', avoidHighways:isMx||heavy }, res);
                });
                d += r?.rows[0].elements[0].distance?.value || 0;
            }
            return d;
        }

        async function optimizeRoute(points, isMx, heavy) {
            const matrix = await new Promise(res => {
                distanceMatrixService.getDistanceMatrix({ origins: points.map(p=>p.location), destinations: points.map(p=>p.location), travelMode:'DRIVING', avoidHighways:isMx||heavy }, res);
            });
            const opt = [points[0]]; const unvisited = Array.from({length: points.length-1}, (_,i)=>i+1);
            let cur = 0;
            while(unvisited.length > 0) {
                let best = 0; let min = Infinity;
                for(let i=0; i<unvisited.length; i++) {
                    const d = matrix.rows[cur].elements[unvisited[i]].distance?.value || Infinity;
                    if(d < min) { min = d; best = i; }
                }
                cur = unvisited.splice(best, 1)[0];
                opt.push(points[cur]);
            }
            return opt;
        }

        function updateSummary(dist, time, eff, risk) {
            document.getElementById('stat-distance').innerText = (dist/1000).toFixed(1) + " km";
            document.getElementById('stat-time').innerText = Math.round(time/60) + " min";
            document.getElementById('stat-efficiency').innerText = (eff > 0 ? eff : 0) + "%";
            document.getElementById('stat-risk').innerText = risk;
            document.getElementById('stat-risk').className = `text-2xl font-black leading-none ${risk === 'ALTO' ? 'text-red-600' : 'text-emerald-500'}`;
        }

        function addTableRow(item, index) {
            const row = document.createElement('tr');
            row.className = item.violation ? "bg-red-50" : "hover:bg-slate-50 transition-all";
            row.innerHTML = `<td class="px-8 py-5 text-center font-black italic text-slate-200 text-lg">${index}</td>
                <td class="px-8 py-5"><div class="flex flex-col"><span class="text-[9px] text-slate-400 font-bold uppercase truncate max-w-[250px]">${item.desde}</span>
                <span class="text-sm font-bold text-slate-700">${item.hasta}</span></div></td>
                <td class="px-8 py-5 text-center font-black">${item.distancia}</td>
                <td class="px-8 py-5 text-center">${item.violation ? `<span class="bg-red-600 text-white px-3 py-1 rounded-md text-[8px] font-black uppercase tracking-tighter">Prohibido EUA</span>` : 
                `<span class="${item.isReturn ? 'bg-blue-50 text-blue-600 border-blue-100' : 'bg-orange-50 text-orange-600 border-orange-100'} px-4 py-1.5 rounded-full text-[10px] font-black border italic">${item.duracion}</span>`}</td>`;
            document.getElementById('results-body').appendChild(row);
        }

        // EXPORTACIÓN PDF
        async function exportInstructionsPDF() {
            if (resultsData.length === 0) return;
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFillColor(79, 70, 229); doc.rect(0, 0, 210, 40, 'F');
            doc.setTextColor(255, 255, 255); doc.setFontSize(22); doc.setFont("helvetica", "bold");
            doc.text("RUTAS PERFILES", 15, 20); doc.setFontSize(10); doc.setFont("helvetica", "normal");
            doc.text(`HOJA DE RUTA LOGÍSTICA - ${new Date().toLocaleDateString()}`, 15, 30);
            
            let y = 55;
            doc.setTextColor(51, 51, 51); doc.setFontSize(14); doc.text("Resumen de Viaje", 15, y); y += 10;
            doc.setFontSize(10); doc.text(`Distancia Total: ${document.getElementById('stat-distance').innerText}`, 15, y); y += 6;
            doc.text(`Tiempo Est.: ${document.getElementById('stat-time').innerText}`, 15, y); y += 15;

            resultsData.forEach((t, i) => {
                if (y > 250) { doc.addPage(); y = 20; }
                doc.setDrawColor(226, 232, 240); doc.line(15, y, 195, y); y += 10;
                doc.setFont("helvetica", "bold"); doc.text(`TRAMO ${i+1}: ${t.desde} -> ${t.hasta}`, 15, y); y += 6;
                doc.setFont("helvetica", "normal"); doc.setFontSize(9);
                if (t.steps) {
                    t.steps.forEach(s => {
                        const txt = s.instructions.replace(/<[^>]*>?/gm, '');
                        const lines = doc.splitTextToSize(`• ${txt}`, 170);
                        if (y > 275) { doc.addPage(); y = 20; }
                        doc.text(lines, 20, y); y += (lines.length * 4) + 2;
                    });
                }
                y += 5;
            });
            doc.save(`Rutas_Perfiles_${new Date().getTime()}.pdf`);
        }

        function exportToCSV() {
            const csv = "\uFEFF" + ['Tramo,Origen,Destino,Distancia,Tiempo'].concat(resultsData.map((r,i) => `${i+1},"${r.desde}","${r.hasta}","${r.distancia}","${r.duracion}"`)).join("\n");
            const a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
            a.download = `Reporte_Perfiles.csv`; a.click();
        }

        function showError(msg) { document.getElementById('error-text').innerText = msg; document.getElementById('error-box').classList.remove('hidden'); }
    </script>
</body>
</html>
